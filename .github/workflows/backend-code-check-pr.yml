name: Backend Code Check

on:
  pull_request:
    branches:
      - '!main'
      - '**'
  workflow_dispatch:

jobs:
  build:
    name: Build
    defaults:
      run:
        working-directory: ./backend
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1

      - name: Setup
        uses: ./.github/actions/backend-node-setup

      - name: Build the project
        run: yarn run esbuild

  check-types:
    name: Check Types
    defaults:
      run:
        working-directory: ./backend
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1

      - name: Setup
        uses: ./.github/actions/backend-node-setup

      - name: Do dry build
        run: yarn run build:dry

  check-code-quality:
    name: Check code quality
    defaults:
      run:
        working-directory: ./backend
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1

      - name: Setup Biome
        uses: biomejs/setup-biome@4c91541eaada48f67d7dbd7833600ce162b68f51 # v2.7.1
        with:
          version: 2.1.4
      
      - name: Run Biome
        run: biome ci .

  run-tests:
    name: Run tests
    defaults:
      run:
        working-directory: ./backend
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1

      - name: Setup
        uses: ./.github/actions/backend-node-setup

      - name: Setup postgres
        run: docker compose -f docker-compose.ci.yml up -d

      - name: Run Vitest
        run: yarn test